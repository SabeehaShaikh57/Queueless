services:
  - type: web
    name: queueless
    runtime: node
    plan: free
    rootDir: .
    buildCommand: cd queueless-backend && npm ci --omit=dev
    startCommand: cd queueless-backend && npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: SERVE_FRONTEND
        value: true
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: CORS_ORIGIN_REGEX
        sync: false
      - key: ADMIN_NAME
        value: QueueLess Admin
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
